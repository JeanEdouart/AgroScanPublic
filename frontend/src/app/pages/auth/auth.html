<section>
  <aside>
    <div class="rings" aria-hidden="true"></div>
    <p>Votre espace AgroScan</p>
    <h1>Gardez vos observations à portée de main.</h1>
  </aside>

  <div class="panel">
    <div class="tabs" role="tablist" aria-label="Choisir un formulaire">
      <button type="button" role="tab" [attr.aria-selected]="mode() === 'login'" (click)="setMode('login')">Connexion</button>
      <button type="button" role="tab" [attr.aria-selected]="mode() === 'register'" (click)="setMode('register')">Inscription</button>
    </div>

    @if (mode() === 'login') {
      <form [formGroup]="loginForm" (ngSubmit)="submitLogin()">
        <header><h2>Bon retour.</h2><p>Connectez-vous pour retrouver votre espace.</p></header>
        <label>E-mail<input type="email" formControlName="email" autocomplete="email" /></label>
        <label>Mot de passe<input type="password" formControlName="password" autocomplete="current-password" /></label>
        <button class="submit" type="submit" [disabled]="loading()">{{ loading() ? 'Connexion…' : 'Se connecter' }}</button>
      </form>
    } @else {
      <form [formGroup]="registerForm" (ngSubmit)="submitRegister()">
        <header><h2>Créer un compte.</h2><p>Quelques informations suffisent pour commencer.</p></header>
        <div class="two-columns">
          <label>Prénom<input type="text" formControlName="firstName" autocomplete="given-name" /></label>
          <label>Nom<input type="text" formControlName="lastName" autocomplete="family-name" /></label>
        </div>
        <label>E-mail<input type="email" formControlName="email" autocomplete="email" /></label>
        <label>Mot de passe<input type="password" formControlName="password" autocomplete="new-password" /><small>8 caractères minimum</small></label>
        <label>Confirmer le mot de passe<input type="password" formControlName="passwordConfirmation" autocomplete="new-password" /></label>
        <button class="submit" type="submit" [disabled]="loading()">{{ loading() ? 'Création…' : 'Créer mon compte' }}</button>
      </form>
    }

    @if (error()) {
      <p class="error" role="alert">{{ error() }}</p>
    }
  </div>
</section>
